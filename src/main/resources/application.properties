# ===========================
# Server
# ===========================
server.port=8081

# ===========================
# Database - MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT
# ===========================
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity
app.jwt.expiration=86400000

# ===========================
# Logging
# ===========================
logging.level.com.jobportal=DEBUG
logging.level.org.springframework.security=DEBUG

# ===========================
# Other
# ===========================
spring.jpa.open-in-view=false